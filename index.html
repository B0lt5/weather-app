<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛅</text></svg>">
  <script src="https://kit.fontawesome.com/8e0278b98b.js" crossorigin="anonymous"></script>
</head>
<body>
  <div class="main">
    <div class="container">
      <h1>Weather App</h1>

      <!-- Search area -->
      <div class="search-box">
        <input type="text" id="city-input" placeholder="Enter a city name..."/>
        <button id="search-btn">Get Weather</button>
      </div>

      <!-- Error message (hidden by default) -->
      <p id="error-msg" class="error hidden">City not found. Try again.</p>

      <!-- Results area (hidden by default) -->
      <div id="weather-result" class="result hidden">
        <h2 id="city-name"></h2>
        <p id="temperature"></p>
        <p id="description"></p>
        <p id="humidity"></p>
        <p id="wind"></p>
        <button id="clear-btn">Clear</button>
      </div>

      <div id="loader" class="loader">
        <div class="spinner"></div>
        <p>Fetching weather...</p>
      </div>
    </div>

    <div class="history-container" id="history-container">
      <h3>Recent Searches</h3>
      <table id="history-table">
        <thead>
          <tr>
            <th>S/N</th>
            <th>Date</th>
            <th>Time</th>
            <th>Location</th>
            <th>Temp (°C)</th>
            <th>Description</th>
            <th>Humidity</th>
            <th>Wind (m/s)</th>
          </tr>
        </thead>
        <tbody id="history-body"></tbody>
      </table>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-container">
      <div class="social-links">
        <a href="https://kt-portfolio-website.vercel.app/" target="_blank"><i class="fa-solid fa-globe fa-1x"></i></a>
        <a href="https://github.com/B0lt5" target="_blank"><i class="fa-brands fa-github fa-1x"></i></a>
        <a href="https://www.linkedin.com/in/kitan-ayoola-1471193a1/" target="_blank"><i class="fa-brands fa-linkedin-in fa-1x"></i></a>
        <a href="https://x.com/oluwakitan17466" target="_blank"><i class="fa-brands fa-x-twitter fa-1x"></i></a>
      </div>
      <p>&copy; 2026 KT</p>
    </div>
  </footer>

  <script src="weather.js"></script>
</body>
</html>
